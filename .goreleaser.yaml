# GoReleaser configuration for the fate-studio binary.
# Tagging vX.Y.Z triggers .github/workflows/release.yml, which builds
# cross-platform binaries, archives, and checksums. The engine is vendored, so
# the build is hermetic.
version: 2

project_name: fate-studio

# No `before` hooks: the engine dependency is vendored, so the build is hermetic
# and must not reach the network (the engine repo is private).

builds:
  - id: fate-studio
    main: ./cmd/fate-studio
    binary: fate-studio
    env: [CGO_ENABLED=0, GOFLAGS=-mod=vendor]
    flags: [-trimpath]
    ldflags: ["-s -w"]
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: default
    ids: [fate-studio]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc

release:
  prerelease: auto
