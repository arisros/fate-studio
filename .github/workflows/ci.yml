name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GOFLAGS: -mod=vendor

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.24', '1.25']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go vet ./...
      - run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: golangci/golangci-lint-action@v6
        with:
          args: --config=.golangci.yml

  goreleaser-check:
    name: validate GoReleaser config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check

  ui:
    name: build UI (React Flow) + drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Hard gate: the UI must type-check and build (tsc --noEmit && vite build).
      - run: npm ci
        working-directory: ui
      - run: npm run build
        working-directory: ui
      # Informational: flag if the committed assets/ differ from a fresh build
      # (i.e. ui/src changed without re-running `make ui`). Not a hard failure,
      # since bundle content-hashes aren't guaranteed byte-identical across
      # build environments.
      - name: assets drift check
        run: |
          if [ -n "$(git status --porcelain -- assets)" ]; then
            echo "::warning::assets/ differs from a fresh UI build — run 'make ui' and commit if this was an intentional UI change"
            git --no-pager diff --stat -- assets || true
          else
            echo "assets/ is up to date with ui/src"
          fi
