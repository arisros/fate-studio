# GoReleaser configuration for the fate CLI.
# Tagging vX.Y.Z triggers .github/workflows/release.yml, which runs goreleaser
# to build cross-platform binaries, archives, and checksums, and publishes them
# on the GitHub release.
version: 2

project_name: fate

before:
  hooks:
    - go mod tidy

builds:
  - id: fate
    main: ./cmd/fate
    binary: fate
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags: ["-s -w"]
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: default
    ids: [fate]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc

release:
  prerelease: auto
